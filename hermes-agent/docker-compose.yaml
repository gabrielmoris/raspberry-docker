version: "3.8"

services:
  # Core Hermes Agent Service
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: agent-hermes
    restart: unless-stopped
    # Running as root to allow the agent to install apps, brew, and skills dynamically
    user: "0:0"
    command: gateway run
    environment:
      # Inference Provider: NVIDIA NIM (build.nvidia.com)
      - HERMES_INFERENCE_PROVIDER=nvidia
      - NVIDIA_API_KEY={NVIDIA_API_KEY}
      - OPENAI_BASE_URL=https://integrate.api.nvidia.com/v1
      - LLM_MODEL=z-ai/glm5
      
      # API Server for external Open WebUI or other frontends
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=sk_hermes_1234567890qwertyuiopasdfghjklzxc
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      
      # Telegram Bot Configuration
      - TELEGRAM_BOT_TOKEN={TELEGTRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS={USER_ID}
      
      # Persistence and System Paths
      - HERMES_HOME=/opt/data
      - MESSAGING_CWD=/opt/data/workspace
    volumes:
      # Deep persistence in the requested host path
      - ./DATA/AppData/agentHermes:/opt/data
    # Shared memory for browser tools (Playwright/Chromium)
    shm_size: "3gb"
    networks:
      - hermes-net

  # Hermes WebUI: Parity with the CLI experience
  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: webui-hermes
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_HOME=/root/.hermes
      - HERMES_WEBUI_PASSWORD={YOUR_UI_PASSWORD}
    volumes:
      # Mount the same data directory for state synchronization
      - ./DATA/AppData/agentHermes:/root/.hermes
    depends_on:
      - hermes-agent
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge